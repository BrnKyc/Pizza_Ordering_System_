<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:insert="~{fragments/header :: head}">
	<meta charset="utf-8">
</head>
<body>

    <div class="container mt-5">
    <div th:insert="~{fragments/body :: header }"></div>
   
        <p class="text-center">Hallo :: Was kann ich für dich tun?</p>
        <a href="/adminMenu" class="btn btn-outline-primary">Pizza bearbeiten</a>
        <a href="/user/users" class="btn btn-outline-primary disabled" tabindex="-1" aria-disabled="true">Users bearbeiten</a>
        <h2>List of Users</h2>
        <button class="btn btn-success" data-bs-toggle="modal" th:attr="data-bs-target='#addUserModal'"  >Add New User</button>
        
		<div class="row" th:each="user : ${users}">
        <div class="col-md-10">
            <div class="card mb-3">
                <div class="card-body">
                <h5 class="card-title">Personal Information</h5>
                <!-- 
		            <p><strong>First Name:</strong> <span th:text="${user.firstname}">John</span></p>
		            <p><strong>Last Name:</strong> <span th:text="${user.lastname}">Doe</span></p>
		            <p><strong>Phone Number:</strong> <span th:text="${user.phoneNumber}">Doe</span></p>
		             -->
		            <p><strong>Email:</strong> <span th:text="${user.email}">john.doe@example.com</span></p>
		           
                    <h5 class="card-title" th:text="${user.username}">Username</h5>
                    <span th:text="${user.email}">Email</span>
                    <div class="mt-3">
                        <button class="btn btn-primary" data-bs-toggle="modal" th:attr="data-bs-target='#editUserModal'"
						        th:data-user-id="${user.id}"
						         th:data-user-username="${user.username}"
						        th:data-user-email="${user.email}"
						        >
						    Edit
						</button>

						<!--  
                        <button class="btn btn-danger"  th:href="@{/admin/deletePizza/(pizzaId=${pizza.id})}">Delete</button>
                        
                        <button th:if="!${user.disabled}" th:onclick="'disableUser(' + ${user.id} + ')'">
                    		Disable
		                </button>
		                <button th:if="${user.disabled}" th:onclick="'enableUser(' + ${user.id} + ')'">
		                    Enable
		                </button>-->
				        <!--  
                        <a class="btn btn-outline-danger" 
							   th:href="@{/user/delete(id=${user.id})}">
							    delete
							</a>
							-->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<!-- Add User Modal -->
<div class="modal fade" th:id="addUserModal" tabindex="-1" role="dialog" aria-labelledby="addUserModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addPizzaModalLabel">Add New User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/user/create}" th:object="${myform}" method="post"  role="form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus="autofocus">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="text" class="form-control" id="Email" name="email" required>
                    </div>
                    <!--  
                    <div class="form-group">
                        <label for="firstname">Firstname</label>
                        <input type="text" class="form-control" id="Firstname" name="firstname" required>
                    </div>
                    <div class="form-group">
                        <label for="lastname">Lastname</label>
                        <input type="text" class="form-control" id="Lastaname" name="lastname" required>
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber">Phone number</label>
                        <input type="text" class="form-control" id="phoneNumber" name="phoneNumber">
                    </div>
                    -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="text" step="0.01" class="form-control" id="Password" name="password" required>
                         <input
								type="password" name="passwordRepeated" class="form-control" placeholder="passwort wiederholen"
								required="required">
                        
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Add User</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Edit Pizza Modal -->
<div class="modal fade" th:id="editUserModal" tabindex="-1" role="dialog" aria-labelledby="editUserModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editUserModalLabel">Update user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/user/update}"  th:object="${myform}" method="post"  role="form">
                    <input type="hidden" id="id" name="id">
                                      
                    <div class="form-group">
                        <label for="editUsername">Username</label>
                        <input type="text" class="form-control" id="editUsername" name="username" required autofocus="autofocus">
                    </div>
                    <div class="form-group">
                        <label for="editEmail">Email</label>
                        <input type="text" class="form-control" id="editEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="editPassword">Password</label>
                        <input type="number" step="0.01" class="form-control" id="editPassword" name="password" required>
                         <input
								type="password" name="passwordRepeated" class="form-control" placeholder="passwort wiederholen"
								required="required">
                        
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>


<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
    // Populate Edit Pizza Modal
    $('#editUserModal').on('show.bs.modal', function (event) {
    // Get the button that triggered the modal
    var button = $(event.relatedTarget);

    // Extract data attributes from the button
    var userId = button.data('user-id');
    var username = button.data('user-username');
    var email = button.data('user-email');

    // Populate the form fields in the modal
    $('#id').val(userId);
    $('#editUsername').val(username);
    $('#editEmail').val(email);
});

    function disableUser(userId) {
        fetch(`/user/${userId}/disable`, { method: 'POST' })
            .then(response => {
                if (response.ok) {
                    alert("User disabled successfully");
                    location.reload();
                } else {
                    alert("Failed to disable user");
                }
            })
            .catch(error => console.error("Error:", error));
    }

    function enableUser(userId) {
        fetch(`/user/${userId}/enable`, { method: 'POST' })
            .then(response => {
                if (response.ok) {
                    alert("User enabled successfully");
                    location.reload();
                } else {
                    alert("Failed to enable user");
                }
            })
            .catch(error => console.error("Error:", error));
    }


</script>			

    
</body>
</html>
