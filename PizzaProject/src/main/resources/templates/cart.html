<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container mt-5">
    <div th:insert="~{fragments/body :: header }"></div>
        <h2>Warenkorb</h2>

        <!-- If cart is empty -->
        <div th:if="${isCartEmpty}">
            <p class="text-danger">Warenkorb ist leer, füllen Sie bitte zuerst aus!</p>
            <a href="/pizzas" class="btn btn-primary">Zur Pizza-Seite</a>
        </div>

        <!-- If cart is not empty -->
        <div th:unless="${isCartEmpty}">
            
            <!-- Cart Table -->
            <table class="table table-bordered mt-3">
                <thead>
                    <tr>
                        <th>Menge</th>
                        <th>Pizza</th>
                        <th>Größe</th>
                        <th>Preis</th>
                        <th>Aktionen</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.quantity}"></td>
                        <td th:text="${item.pizza.name}"></td>
                        <td th:text="${item.pizzasize}"></td>
                        <td th:text="${item.price} + ' €'"></td>
                        <td>
                            <!-- Edit Item Button -->
                            <button type="button" class="btn btn-outline-primary" 
                                    data-bs-toggle="modal" 
                                    th:attr="data-bs-target='#edit-item-modal-' + ${item.id}">
                                bearbeiten
                            </button>
                            
                            <a class="btn btn-outline-danger" 
							   th:href="@{/cart/removeItem(itemId=${item.id})}">
							    löschen
							</a>
                        </td>
                    </tr>
                </tbody>
            </table>

 
            <a th:href="@{/cart/orderDetails(id=${cart.id})}" class="btn btn-outline-success mt-3">Bestellen</a>
            
            <!-- Clear Cart Button -->
            <a href="/cart/clear" class="btn btn-danger mt-3">Den Korb leeren</a>
        </div>

        <!-- Modal Templates -->

        <!-- Edit Item Modals -->
        <div th:each="item : ${items}">
            <div class="modal fade" th:id="'edit-item-modal-' + ${item.id}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Artikel bearbeiten</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form th:action="@{/cart/editItem}" method="post">
                                <div class="mb-3">
                                    <label for="size" class="form-label">Größe</label>
                                    <select name="size" class="form-select">
                                        <option value="Small" th:text="'Small / ' + ${item.pizza.priceSmall}"></option>
                                        <option value="Medium" th:text="'Medium / ' + ${item.pizza.priceMedium}"></option>
                                        <option value="Large" th:text="'Large / ' + ${item.pizza.priceLarge}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="quantity" class="form-label">Anzahl</label>
                                    <input type="number" name="quantity" min="1" class="form-control" th:value="${item.quantity}">
                                </div>
                                <input type="hidden" name="itemId" th:value="${item.id}">
                                <button type="submit" class="btn btn-primary">Ändern</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>



        <div th:insert="~{fragments/footer :: footer}"></div>
    </div>
</body>
</html>
