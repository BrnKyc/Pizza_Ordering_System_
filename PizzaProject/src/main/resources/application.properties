spring.application.name=PizzaProjekt_Bektenaliev_Kalimov_Koyuncu
server.port=8080

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.generate-unique-name=false
spring.jpa.properties.hibernate.column_ordering_strategy=legacy

#spring.datasource.password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

server.servlet.session.timeout=30m

my.smmp.plainCreds=user:plainTextPassword
my.smmp.url=http://localhost:9090/users/

logging.level.org.springframework.security=DEBUG
